name: Release

on:
  push:
    branches:
      - main
      - sandbox
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.12.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: pnpm i

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      - name: Run tests
        run: pnpm turbo run test

      - name: Sync SDK from OpenAPI (main)
        if: github.ref == 'refs/heads/main'
        run: pnpm complete-sync

      - name: Sync SDK from OpenAPI (sandbox)
        if: github.ref == 'refs/heads/sandbox'
        run: pnpm complete-sync-test

      - name: Build packages
        run: pnpm turbo run build

      - name: Version packages (sandbox beta)
        if: github.ref == 'refs/heads/sandbox'
        run: pnpm changeset version

      - name: Commit version changes (sandbox beta)
        if: github.ref == 'refs/heads/sandbox'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "chore: version packages (beta)"
          git push

      - name: Create .npmrc (sandbox beta)
        if: github.ref == 'refs/heads/sandbox'
        run: |
          cat << EOF > "$HOME/.npmrc"
            //registry.npmjs.org/:_authToken=$NPM_TOKEN
          EOF
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish beta packages (sandbox)
        if: github.ref == 'refs/heads/sandbox'
        run: pnpm changeset publish

      - name: Create Release Pull Request or Publish
        if: github.ref == 'refs/heads/main'
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: pnpm changeset publish
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Log published packages
        if: github.ref == 'refs/heads/main' && steps.changesets.outputs.published == 'true'
        run: |
          echo "Published packages:"
          echo '${{ steps.changesets.outputs.publishedPackages }}'
